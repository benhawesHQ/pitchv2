<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch | Find Live Music Venues That Fit Your Audience and Sound</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800;900&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">
</head>

<body>

<header class="hero">
  <div class="hero-overlay">

    <!-- SEARCH OVERLAY -->
    <div id="searchOverlay" class="search-overlay">
      <div class="stage-animation">
        <div class="spotlight left"></div>
        <div class="spotlight right"></div>
        <div class="mic">🎤</div>
        <p class="stage-text">Finding the right rooms...</p>
      </div>
    </div>
    <!-- END SEARCH OVERLAY -->

    <div class="nav">
      <div class="logo">Pitch<span>.</span></div>
      <a href="#" class="guide-btn">Download Guide</a>
    </div>

    <div class="hero-content">

      <h1>Find Live Music Venues That Fit Your Audience and Sound</h1>

      <p class="subhead">
        Discover venues aligned with your crowd size, location, and style.
      </p>

      <div class="search-container">

        <div class="row">
          <div class="field">
            <label>City or neighborhood</label>
            <input id="city" placeholder="Lower East Side, Chicago, Sunset District">
          </div>

          <div class="field">
            <label>Audience size</label>
            <input id="audience" placeholder="40">
          </div>
        </div>

        <div class="row">
          <div class="field">
            <label>Vibe (optional)</label>
            <input id="vibe" placeholder="Cabaret, rock, indie">
          </div>

          <div class="field">
            <label>Results</label>
            <select id="count">
              <option value="5">5 venues</option>
              <option value="10" selected>10 venues</option>
              <option value="15">15 venues</option>
            </select>
          </div>
        </div>

        <button id="searchBtn" class="primary-btn">
          Find Venues
        </button>

        <div class="trust-line">
          Powered by real venue listings and live location data.
        </div>

      </div>
    </div>

  </div>
</header>

<section class="results-section">
  <div id="results"></div>
</section>

<script src="script.js"></script>
</body>
</html>
