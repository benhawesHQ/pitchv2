<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch | Find Your Next Stage</title>

<!-- 🎸 Favicon -->
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎸</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">

  <div class="hero-overlay">

    <div class="top-bar">
      <div class="logo">Pitch<span>.</span></div>
    </div>

    <div class="hero-content">
      <h1>Find Your Next Stage</h1>
      <p>Discover the right venue faster so you can play more music.</p>
    </div>

    <!-- Search Panel -->
    <div class="search-panel">
      <input placeholder="City (Brooklyn, Portland, Berlin)">
      <input placeholder="Expected Audience (25, 40, 80)">
      <input placeholder="Vibe (Intimate, standing room, indie crowd)">
      <select>
        <option>5 venues</option>
        <option selected>10 venues</option>
        <option>15 venues</option>
      </select>
      <button class="search-btn">Search Venues</button>
    </div>

  </div>

</header>

<section class="results-wrapper">
  <div class="results-grid">
    <!-- Result cards will go here later -->
  </div>
</section>

</body>
</html>
