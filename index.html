<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch | Find Your Next Stage</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎸</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
  <div class="hero-overlay">

    <div class="top-bar">
      <div class="logo">Pitch<span>.</span></div>
    </div>

    <div class="hero-content">
      <h1>Find Your Next Stage</h1>
      <p>Discover the right venue faster so you can play more music.</p>
    </div>

    <div class="generator-bar">

      <div class="generator-field">
        <label>📍 City</label>
        <input id="city" placeholder="Brooklyn, Portland, Berlin">
      </div>

      <div class="generator-field">
        <label>👥 Audience Size</label>
        <input id="audience" placeholder="25, 40, 80">
      </div>

      <div class="generator-field">
        <label>🎶 Vibe (optional)</label>
        <input id="vibe" placeholder="Rock, jazz, cabaret, comedy">
      </div>

      <div class="generator-field small">
        <label>🎯 Results</label>
        <select id="count">
          <option value="5">5 venues</option>
          <option value="10" selected>10 venues</option>
          <option value="15">15 venues</option>
        </select>
      </div>

      <button id="searchBtn" class="generate-btn">
        Generate Venues
      </button>

    </div>

  </div>
</header>

<section class="results-wrapper">
  <div id="results" class="results-grid"></div>
</section>

<script>
document.getElementById("searchBtn").addEventListener("click", function() {
  console.log("Search clicked");
});
</script>

</body>
</html>
