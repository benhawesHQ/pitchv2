<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitch | Find Your Next Stage</title>

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎸</text></svg>">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>

<body>

<header class="hero">
  <div class="hero-overlay">

    <div class="top-bar">
      <div class="logo">Pitch<span>.</span></div>
      <a href="#" class="guide-btn">Download Guide</a>
    </div>

    <div class="hero-content">
      <h1>Find Your Next Stage</h1>
      <p>Discover the right venue faster so you can play more music.</p>
    </div>

    <div class="generator-bar">

      <div class="generator-field">
        <label>City or Neighborhood</label>
        <input id="city" placeholder="Lower East Side, Brooklyn, Chicago">
      </div>

      <div class="generator-field">
        <label>Audience Size</label>
        <input id="audience" placeholder="40">
      </div>

      <div class="generator-field">
        <label>Vibe (optional)</label>
        <input id="vibe" placeholder="Cabaret, rock, indie">
      </div>

      <div class="generator-field">
        <label>Results</label>
        <select id="count">
          <option value="5">5 venues</option>
          <option value="10" selected>10 venues</option>
          <option value="15">15 venues</option>
        </select>
      </div>

      <button id="searchBtn" class="generate-btn">
        Generate Venues
      </button>

    </div>

  </div>
</header>

<section class="results-wrapper">
  <div id="results"></div>
</section>

<div id="stage-overlay" class="stage-overlay">
  <div class="stage-content">
    <div class="spotlights"></div>
    <div class="floating-emojis">🎤 🎸</div>
    <div class="fun-fact" id="funFact"></div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
